version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - npm ci
      - npm install -g aws-cdk
      - pip install git+https://github.com/awslabs/automated-security-helper.git@v3.2.6
  pre_build:
    commands:
      - echo "Running cdk synth to generate CloudFormation templates..."
      - aws secretsmanager get-secret-value --secret-id ${APP_NAME}-pipeline-environments --query SecretString --output text > environments.json || true
      - npx aws-cdk synth --quiet || true
      - echo "CFN templates generated in cdk.out/"
  build:
    commands:
      - echo "Running ASH security scan in local mode..."
      - ash --mode local --source-dir . || true
  post_build:
    commands:
      - echo "=== ASH Scan Results ==="
      - ls -la .ash/ash_output/reports/ 2>/dev/null || echo "No reports directory"
      - python3 -c "import json,sys; f=open('.ash/ash_output/reports/ash.sarif'); d=json.load(f); [print(r['tool']['driver']['name']+':', len(r.get('results',[])), 'findings') for r in d.get('runs',[])]" 2>/dev/null || echo "No SARIF report found"
      - echo "=== Security Scan Complete ==="

artifacts:
  base-directory: .ash/ash_output
  files:
    - '**/*'
